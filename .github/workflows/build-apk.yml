name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      map_url:
        description: "Backend map URL for the app"
        required: false
        default: "https://family-map-app-server.run.app/map"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate Android project)
        env:
          EXPO_PUBLIC_MAP_URL: ${{ github.event.inputs.map_url || 'https://family-map-app-server.run.app/map' }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-map-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Family Map APK (build ${{ github.run_number }})"
          body: |
            ## Family Map Android APK

            Debug build for stakeholder testing.

            ### Install
            1. Download `app-debug.apk` from Assets below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install

            ### Build info
            - Commit: ${{ github.sha }}
            - Map URL: ${{ github.event.inputs.map_url || 'https://family-map-app-server.run.app/map' }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
